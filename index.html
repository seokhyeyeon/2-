<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이화여자고등학교 안내 웹앱</title>
    
    <style>
        /* 기본 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #000; 
        }

        /* 1. 상단 투명도 60% 바 (사진 위를 덮는 구조) */
        .top-bar {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.6); 
            z-index: 1000; 
            padding: 15px 20px; 
            display: flex;
            align-items: center;
        }

        .logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
        }

        .logo-img {
            height: 40px; 
            width: auto;
            object-fit: contain; 
        }

        /* 2. 16:9 슬라이더 컨테이너 (웹사이트 맨 위 0px부터 시작) */
        .slider-container {
            position: relative;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto; 
            aspect-ratio: 16 / 9; 
            overflow: hidden;
            background-color: #000;
        }

        /* 옆으로 부드럽게 넘어가는 애니메이션 */
        .slider-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
            /* 자바스크립트에서 제어할 예정이므로 transition은 필요할 때만 켜고 끕니다 */
        }

        .slide {
            flex: 0 0 100%; 
            width: 100%;
            height: 100%;
            position: relative;
            cursor: pointer; 
        }

        .slide img, 
        .slide video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 3. 슬라이더 좌우 화살표 버튼 */
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: transparent; 
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.7); 
            border-radius: 50%; 
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 18px;
            z-index: 10;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .slider-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
            border-color: white;
        }

        .left-btn { left: 20px; }
        .right-btn { right: 20px; }

        /* 첫 사진 중앙 텍스트 애니메이션 */
        .intro-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
            width: 100%;
            pointer-events: none; 
        }

        .text-ko {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 5px;
            opacity: 0; 
        }

        .text-en {
            font-size: 32px;
            font-weight: 300;
            font-family: 'Times New Roman', serif; 
            letter-spacing: 1px;
            opacity: 0; 
        }

        @keyframes slideUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .intro-text.animate .text-ko {
            animation: slideUp 0.8s ease forwards;
            animation-delay: 0.2s; 
        }

        .intro-text.animate .text-en {
            animation: slideUp 0.8s ease forwards;
            animation-delay: 0.6s; 
        }

        /* 하단 내용 영역 */
        .content-area {
            padding: 40px 20px;
            text-align: center;
            max-width: 1000px;
            margin: 0 auto;
            background-color: #f4f4f4;
            min-height: 50vh;
        }

        .detail-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #2c3e50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <header class="top-bar">
        <a onclick="resetApp()" class="logo-link">
            <img src="logo.png" alt="이화여고 로고" class="logo-img">
        </a>
    </header>

    <main>
        <section class="slider-container">
            <button class="slider-btn left-btn" onclick="moveSlide(-1, event)">&#10094;</button>

            <div class="slider-wrapper" id="sliderWrapper">
                <div class="slide">
                    <video src="IMG_1062.MOV" autoplay muted loop playsinline></video>
                </div>

                <div class="slide" id="firstSlideReal">
                    <img src="IMG_2158.jpg" alt="체육관 학생들">
                    <div class="intro-text animate" id="introText">
                        <div class="text-ko">이화여자고등학교</div>
                        <div class="text-en">EWHA HIGH SCHOOL</div>
                    </div>
                </div>
                
                <div class="slide">
                    <img src="IMG_2162.jpeg" alt="손을 모은 학생들">
                </div>
                
                <div class="slide">
                    <img src="IMG_2163 (1).jpeg" alt="야구잠바를 입은 학생들">
                </div>
                
                <div class="slide">
                    <video src="IMG_1591.mov" autoplay muted loop playsinline></video>
                </div>
                
                <div class="slide">
                    <video src="IMG_1062.MOV" autoplay muted loop playsinline></video>
                </div>

                <div class="slide">
                    <img src="IMG_2158.jpg" alt="체육관 학생들">
                </div>
            </div>

            <button class="slider-btn right-btn" onclick="moveSlide(1, event)">&#10095;</button>
        </section>

        <section class="content-area">
            <h3>상세 안내 페이지로 이동</h3>
            <p>아래 버튼을 눌러 각 상세 페이지로 이동할 수 있습니다.</p>
            <a href="chat1.html" class="detail-link">세부 페이지 1 (지도)</a>
            <a href="chat2.html" class="detail-link">세부 페이지 2 (안내)</a>
        </section>
    </main>

    <script>
        // 무한 슬라이드를 위해 인덱스를 1(진짜 첫 번째 사진)로 시작합니다.
        let currentIndex = 1; 
        const sliderWrapper = document.getElementById('sliderWrapper');
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length; // 가짜 포함 총 7개
        const introText = document.getElementById('introText');
        
        let isTransitioning = false; // 애니메이션 도중 중복 클릭 방지

        // 초기 화면 세팅 (가짜를 건너뛰고 진짜 첫 번째 사진 위치로 이동)
        sliderWrapper.style.transform = `translateX(-${currentIndex * 100}%)`;

        // 애니메이션 재실행 공통 함수
        function triggerIntroAnimation() {
            introText.classList.remove('animate');
            void introText.offsetWidth; 
            introText.classList.add('animate');
        }

        // 앱 초기화 함수 (첫 화면으로 돌아가기)
        function resetApp() {
            if (isTransitioning) return;
            currentIndex = 1;
            sliderWrapper.style.transition = 'transform 0.5s ease-in-out';
            sliderWrapper.style.transform = `translateX(-${currentIndex * 100}%)`;
            triggerIntroAnimation();
            window.scrollTo(0, 0);
        }

        // 사진/영상 클릭 시 초기화
        slides.forEach((slide) => {
            slide.addEventListener('click', () => {
                resetApp();
            });
        });

        // 슬라이드 이동 함수 (원형 무한 루프 로직)
        function moveSlide(direction, event) {
            if (event) event.stopPropagation(); 
            if (isTransitioning) return; // 애니메이션 중이면 클릭 무시

            isTransitioning = true;
            currentIndex += direction;

            // 일단 부드럽게 옆방으로 이동
            sliderWrapper.style.transition = 'transform 0.5s ease-in-out';
            sliderWrapper.style.transform = `translateX(-${currentIndex * 100}%)`;

            // 첫 번째 사진(진짜 위치)으로 올 때 글씨 애니메이션 처리
            if (currentIndex === 1) {
                triggerIntroAnimation();
            }
        }

        // 애니메이션(스르륵 이동)이 끝난 직후 순간이동 처리하는 순간
        sliderWrapper.addEventListener('transitionend', () => {
            isTransitioning = false;

            // 1. 맨 오른쪽 가짜 첫 번째 사진에 도달했을 때 -> 진짜 첫 번째 사진으로 순간이동
            if (currentIndex === totalSlides - 1) {
                sliderWrapper.style.transition = 'none'; // 애니메이션 끄고
                currentIndex = 1;
                sliderWrapper.style.transform = `translateX(-${currentIndex * 100}%)`;
                triggerIntroAnimation(); // 순간이동 후 애니메이션 켜주기
            }
            
            // 2. 맨 왼쪽 가짜 마지막 영상에 도달했을 때 -> 진짜 마지막 영상으로 순간이동
            if (currentIndex === 0) {
                sliderWrapper.style.transition = 'none'; // 애니메이션 끄고
                currentIndex = totalSlides - 2;
                sliderWrapper.style.transform = `translateX(-${currentIndex * 100}%)`;
            }
        });
    </script>
</body>
</html>
